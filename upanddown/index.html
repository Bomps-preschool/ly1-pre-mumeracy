<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Up and Down</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#000;
}

#splash{
position:fixed;
inset:0;
background:white;
border:8px solid #FFD700;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#splash img{
width:220px;
max-width:70%;
}

#splash h1{
margin-top:20px;
font-size:48px;
color:#333;
}

#game{
display:none;
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

.topbar{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:20;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.9);
padding:10px;
border-radius:10px;
}

.questionBox{
font-size:22px;
font-weight:bold;
}

.scoreBox{
display:flex;
gap:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

#scene{
width:100%;
height:100%;
object-fit:cover;
}

.hotspot{
position:absolute;
border-radius:50%;
cursor:pointer;
}

.correct{
outline:8px solid lime;
}

.wrong{
outline:8px solid red;
}

.glow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 10px yellow;}
50%{box-shadow:0 0 50px yellow;}
100%{box-shadow:0 0 10px yellow;}
}

.tick{
position:absolute;
font-size:70px;
font-weight:bold;
z-index:30;
pointer-events:none;
}

.green{
color:lime;
}

.red{
color:red;
}

#endScreen{
display:none;
position:fixed;
inset:0;
background:#fff;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:500;
}

#endScreen h1{
font-size:50px;
margin-bottom:20px;
}

#endScreen p{
font-size:30px;
margin-bottom:20px;
}
</style>
</head>

<body>

<div id="splash">
<img src="assets/innovinelogo.png">
<h1>UP AND DOWN</h1>
</div>

<div id="game">

<div class="topbar">
<div class="questionBox" id="questionText"></div>

<div class="scoreBox">
<div id="score">Score: 0/8</div>
<button id="muteBtn">🔊</button>
<button onclick="restartGame()">Restart</button>
</div>
</div>

<img id="scene">

<div id="hotspot"></div>

</div>

<div id="endScreen">
<h1>🎉 You Have Done A Great Job!</h1>
<p id="finalScore"></p>
<button onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>

let muted=false;

const questions=[

{
question:"Tap the aeroplane flying up in the sky",
image:"assets/aeroplane and car.png",

correct:{
left:"18%",
top:"7%",
width:"55%",
height:"28%"
},

wrong:{
left:"26%",
top:"56%",
width:"48%",
height:"28%"
}
},

{
question:"Tap the bird on the ground",

image:"assets/birds.png",

correct:{
left:"52%",
top:"67%",
width:"18%",
height:"18%"
},

wrong:{
left:"18%",
top:"12%",
width:"18%",
height:"18%"
}
},

{
question:"Tap the cat on the roof",

image:"assets/catdog.png",

correct:{
left:"70%",
top:"8%",
width:"15%",
height:"15%"
},

wrong:{
left:"15%",
top:"60%",
width:"18%",
height:"20%"
}
},

{
question:"Tap the girl coming down the elevator",

image:"assets/elevator.png",

correct:{
left:"58%",
top:"28%",
width:"16%",
height:"42%"
},

wrong:{
left:"38%",
top:"18%",
width:"16%",
height:"42%"
}
},

{
question:"Tap the lift going up",

image:"assets/lift.png",

correct:{
left:"20%",
top:"22%",
width:"22%",
height:"42%"
},

wrong:{
left:"58%",
top:"35%",
width:"22%",
height:"42%"
}
},

{
question:"Tap the child who is down on the seesaw",

image:"assets/seasaw.png",

correct:{
left:"18%",
top:"25%",
width:"22%",
height:"38%"
},

wrong:{
left:"62%",
top:"32%",
width:"22%",
height:"38%"
}
},

{
question:"Tap the boy who is climbing the slide",

image:"assets/slide.png",

correct:{
left:"70%",
top:"15%",
width:"18%",
height:"45%"
},

wrong:{
left:"12%",
top:"45%",
width:"22%",
height:"30%"
}
},

{
question:"Tap the downside of the weighting scale",

image:"assets/weightingscale.png",

correct:{
left:"18%",
top:"38%",
width:"20%",
height:"24%"
},

wrong:{
left:"68%",
top:"38%",
width:"18%",
height:"20%"
}
}

];

let current=0;
let score=0;
let wrongAttempts=0;

const scene=document.getElementById("scene");
const hotspot=document.getElementById("hotspot");
const questionText=document.getElementById("questionText");

function playSound(id){
if(!muted){
document.getElementById(id).play();
}
}

function loadQuestion(){

wrongAttempts=0;

const q=questions[current];

scene.src=q.image;

questionText.innerHTML=
`Q${current+1}: ${q.question}`;

document.getElementById("score").innerHTML=
`Score: ${score}/8`;

createHotspots(q);
}

function createHotspots(q){

hotspot.innerHTML="";

const correct=document.createElement("div");
correct.className="hotspot";

Object.assign(correct.style,q.correct);

correct.onclick=()=>correctAnswer(correct);

const wrong=document.createElement("div");
wrong.className="hotspot";

Object.assign(wrong.style,q.wrong);

wrong.onclick=()=>wrongAnswer(correct,wrong);

hotspot.appendChild(correct);
hotspot.appendChild(wrong);
}

function correctAnswer(el){

playSound("correctSound");

score++;

el.classList.add("correct");

setTimeout(nextQuestion,1000);
}

function wrongAnswer(correct,wrong){

playSound("wrongSound");

wrong.classList.add("wrong");

wrongAttempts++;

if(wrongAttempts===1){

correct.classList.add("glow");

}else{

correct.classList.add("correct");

setTimeout(nextQuestion,2000);
}
}

function nextQuestion(){

current++;

if(current>=questions.length){

finishGame();
return;
}

loadQuestion();
}

function finishGame(){

document.getElementById("game").style.display="none";

document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML=
`Your Score: ${score}/8`;

playSound("clapSound");
}

function restartGame(){

location.reload();
}

document.getElementById("muteBtn").onclick=()=>{

muted=!muted;

document.getElementById("muteBtn").innerHTML=
muted?"🔇":"🔊";
};

setTimeout(()=>{

document.getElementById("splash").style.display="none";

document.getElementById("game").style.display="block";

loadQuestion();

},5000);

</script>

</body>
</html>
