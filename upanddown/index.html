<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Up and Down</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f2f2f2;overflow:hidden;}

#gameContainer{
    width:100vw;height:100vh;background:white;
    border:8px solid #f4c400;position:relative;overflow:hidden;
}

#splash{
    position:absolute;inset:0;background:white;
    display:flex;justify-content:center;align-items:center;
    z-index:9999;
}

.logoOnly{width:220px;max-width:70%;}

#topBar{
    width:100%;padding:10px;background:#fff8d6;
    border-bottom:3px solid #f4c400;
    display:flex;justify-content:space-between;align-items:center;
}

#title{
    background:#f4c400;padding:10px 20px;
    border-radius:15px;font-size:24px;font-weight:bold;
}

.topInfo{font-size:18px;font-weight:bold;}

button{
    padding:8px 14px;border:none;border-radius:10px;
    background:#f4c400;font-weight:bold;cursor:pointer;
    margin-left:5px;
}

#questionArea{text-align:center;padding:15px;}
#questionText{font-size:32px;color:#222;}

#imageArea{
    width:100%;height:68vh;
    display:flex;justify-content:center;align-items:center;
}

.scene{position:relative;width:100%;height:100%;}
.scene img{width:100%;height:100%;object-fit:contain;}

.hotspot{
    position:absolute;
    cursor:pointer;
    background:rgba(255,255,255,0);
}

.correctMark{
    position:absolute;width:60px;height:60px;
    background:#00c853;border-radius:50%;
    display:flex;justify-content:center;align-items:center;
    color:white;font-size:32px;font-weight:bold;z-index:100;
}

.glow{animation:glow 1s infinite;}

@keyframes glow{
    0%{box-shadow:0 0 5px gold;}
    50%{box-shadow:0 0 25px gold;}
    100%{box-shadow:0 0 5px gold;}
}

#feedback{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:42px;font-weight:bold;
    z-index:100;display:none;
}

#endScreen{
    position:absolute;inset:0;background:white;
    display:none;flex-direction:column;
    justify-content:center;align-items:center;
    z-index:500;
}

#endScreen h1{color:#28a745;font-size:50px;margin-bottom:20px;}
#endScreen p{font-size:28px;margin-bottom:20px;}

@media(max-width:768px){
    #questionText{font-size:22px;}
    #title{font-size:18px;}
    .topInfo{font-size:14px;}
    .logoOnly{width:170px;}
}
</style>
</head>

<body>

<div id="gameContainer">

<div id="splash">
<img src="assets/innovinelogo.png" class="logoOnly">
</div>

<div id="topBar">
<div id="title">Up and Down</div>

<div class="topInfo">
Score: <span id="score">0</span>/8
</div>

<div>
<button onclick="toggleMute()" id="muteBtn">Mute</button>
<button onclick="restartGame()">Restart</button>
<button onclick="repeatQuestion()">Repeat</button>
</div>
</div>

<div id="questionArea">
<div id="questionText"></div>
</div>

<div id="imageArea">
<div class="scene" id="scene"></div>
</div>

<div id="feedback"></div>

<div id="endScreen">
<h1>Great Job!</h1>
<p>You have done a great job!</p>
<p>Score: <span id="finalScore"></span>/8</p>
<button onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
let currentQuestion = 0;
let score = 0;
let wrongAttempts = 0;
let muted = false;
let questionAnswered = false;

const questions = [
{
question:"Tap the aeroplane flying up in the sky",
background:"assets/aeroplane and car.png",
x:"20%",y:"8%",w:"58%",h:"25%",
tickX:"40%",tickY:"10%"
},
{
question:"Tap the bird on the ground",
background:"assets/birds.png",
x:"45%",y:"60%",w:"30%",h:"30%",
tickX:"55%",tickY:"70%"
},
{
question:"Tap the cat on the roof",
background:"assets/catdog.png",
x:"60%",y:"5%",w:"28%",h:"28%",
tickX:"70%",tickY:"10%"
},
{
question:"Tap the girl coming down the elevator",
background:"assets/elevator.png",
x:"54%",y:"22%",w:"15%",h:"40%",
tickX:"58%",tickY:"40%"
},
{
question:"Tap the lift going up",
background:"assets/lift.png",
x:"18%",y:"10%",w:"28%",h:"55%",
tickX:"25%",tickY:"30%"
},
{
question:"Tap the child who is down on the seesaw",
background:"assets/seasaw.png",
x:"55%",y:"40%",w:"35%",h:"45%",
tickX:"65%",tickY:"55%"
},
{
question:"Tap the boy who is climbing the slide",
background:"assets/slide.png",
x:"70%",y:"10%",w:"25%",h:"60%",
tickX:"75%",tickY:"25%"
},
{
question:"Tap the lower side of the weighing scale",
background:"assets/weightingscale.png",
x:"8%",y:"44%",w:"32%",h:"30%",
tickX:"15%",tickY:"55%"
}
];

function speak(text, delay=500){
    if(muted) return;
    speechSynthesis.cancel();
    setTimeout(()=>{
        const speech = new SpeechSynthesisUtterance(text);
        speech.rate = 0.85;
        speech.pitch = 1;
        speech.volume = 1;
        speechSynthesis.speak(speech);
    }, delay);
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    loadQuestion();
},5000);

function loadQuestion(){
    if(currentQuestion >= questions.length){
        endGame();
        return;
    }

    wrongAttempts = 0;
    questionAnswered = false;

    const q = questions[currentQuestion];
    document.getElementById("questionText").innerText = q.question;
    speak(q.question);

    const scene = document.getElementById("scene");
    scene.innerHTML = `
        <img src="${q.background}">
        <div class="hotspot" id="correctArea"
        style="left:${q.x};top:${q.y};width:${q.w};height:${q.h};"></div>
    `;

    const hotspot = document.getElementById("correctArea");

    hotspot.addEventListener("pointerdown", function(e){
        e.stopPropagation();
        correctAnswer();
    });

    scene.addEventListener("pointerdown", function(e){
        if(e.target.id !== "correctArea"){
            wrongAnswer();
        }
    }, {once:true});
}

function showTick(){
    const q = questions[currentQuestion];
    const mark = document.createElement("div");
    mark.className = "correctMark";
    mark.innerHTML = "✓";
    mark.style.left = q.tickX;
    mark.style.top = q.tickY;
    document.getElementById("scene").appendChild(mark);
}

function correctAnswer(){
    if(questionAnswered) return;
    questionAnswered = true;

    if(!muted){
        document.getElementById("correctSound").play();
    }

    showTick();
    score++;
    document.getElementById("score").innerText = score;

    showFeedback("Correct!","green");
    speak("Excellent",200);

    setTimeout(()=>{
        currentQuestion++;
        loadQuestion();
    },1500);
}

function wrongAnswer(){
    if(questionAnswered) return;
    wrongAttempts++;

    if(!muted){
        document.getElementById("wrongSound").play();
    }

    if(wrongAttempts === 1){
        showFeedback("Try Again","red");
        speak("Try again",200);
        document.getElementById("correctArea").classList.add("glow");
    }else{
        questionAnswered = true;
        showTick();
        showFeedback("Correct Answer","green");
        setTimeout(()=>{
            currentQuestion++;
            loadQuestion();
        },1500);
    }
}

function showFeedback(text,color){
    const fb = document.getElementById("feedback");
    fb.innerText = text;
